on:
  workflow_dispatch:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish_docker:
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
      
      - name: Install npm dependencies
        run: npm ci
        working-directory: Meziantou.OnlineVideoPlayer
      
      - name: Compile TypeScript
        run: npm run build
        working-directory: Meziantou.OnlineVideoPlayer
      
      - name: Log in to Docker
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create image
        run: dotnet publish Meziantou.OnlineVideoPlayer/Meziantou.OnlineVideoPlayer.csproj --os linux --arch x64 --configuration Release /t:PublishContainer /bl:publish.binlog

      - name: Upload binlog
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: binlog
          path: "**/*.binlog"
